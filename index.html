<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>広島・宮島 2泊3日 旅のしおり</title>
  <meta name="description" content="広島・宮島 2泊3日 家族旅行プラン。旅程と地図つきの旅のしおり。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛩️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500&family=Yomogi&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー / ヒーロー -->
  <header class="hero">
    <div class="hero-pattern" aria-hidden="true"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow"><span class="hero-line"></span>FAMILY TRIP — SETOUCHI<span class="hero-line"></span></p>
      <h1 class="hero-title" id="site-title">広島・宮島</h1>
      <p class="hero-subtitle" id="site-subtitle">2泊3日 満喫旅行プラン</p>
      <p class="hero-note" id="site-note">夕食外食アレンジ版</p>
      <p class="hero-countdown" id="hero-countdown" hidden></p>
      <div class="hero-torii" aria-hidden="true">
        <svg viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14 C 40 22, 80 22, 116 14 L 113 26 L 7 26 Z" fill="currentColor"/>
          <rect x="14" y="34" width="92" height="7" fill="currentColor"/>
          <rect x="57" y="26" width="6" height="8" fill="currentColor"/>
          <rect x="24" y="26" width="8" height="60" fill="currentColor" transform="rotate(-2 28 56)"/>
          <rect x="88" y="26" width="8" height="60" fill="currentColor" transform="rotate(2 92 56)"/>
        </svg>
      </div>
    </div>
    <div class="hero-wave" aria-hidden="true"></div>
  </header>

  <main>
    <!-- 旅程 + 地図 -->
    <section class="section itinerary-section" aria-labelledby="itinerary-title">
      <div class="section-head">
        <span class="section-num">壱</span>
        <h2 id="itinerary-title">旅程と地図</h2>
        <button class="edit-toggle" id="edit-toggle" hidden aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          <span id="edit-toggle-label">編集</span>
        </button>
      </div>

      <nav class="day-tabs" id="day-tabs" aria-label="日程の選択"></nav>

      <div class="itinerary-layout">
        <div class="timeline-pane">
          <p class="day-theme" id="day-theme"></p>
          <ol class="timeline" id="timeline"></ol>
        </div>
        <div class="map-pane" id="map-pane">
          <div class="map-sheet-head">
            <span class="map-sheet-handle" aria-hidden="true"></span>
            <button class="map-close" id="map-close" aria-label="地図を閉じる">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
          </div>
          <div class="map-frame">
            <div class="map-pick-banner" id="map-pick-banner" hidden>地図をタップして位置を指定</div>
            <div id="map" role="application" aria-label="旅程の地図"></div>
          </div>
          <p class="map-hint">ピンをタップすると旅程がハイライトされます</p>
        </div>
      </div>

      <button class="map-toggle" id="map-toggle" aria-expanded="false" aria-controls="map-pane">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.1 6.1 9.9 4 4.6 6.1a1 1 0 0 0-.6.9v11.5a1 1 0 0 0 1.4.9L9.9 17.5l4.2 2.1 5.3-2.1a1 1 0 0 0 .6-.9V5.1a1 1 0 0 0-1.4-.9L14.1 6.1Z"/><path d="M9.9 4v13.5"/><path d="M14.1 6.1v13.5"/></svg>
        地図
      </button>
    </section>

    <!-- 持ち物チェック -->
    <section class="section packing-section" aria-labelledby="packing-title">
      <div class="section-head">
        <span class="section-num">弐</span>
        <h2 id="packing-title">持ち物チェック</h2>
      </div>
      <ul class="packing-list" id="packing-list"></ul>
      <form class="packing-form" id="packing-form">
        <input type="text" id="packing-input" placeholder="持ち物を追加…" maxlength="40" aria-label="持ち物を追加">
        <button type="submit">追加</button>
      </form>
      <p class="packing-hint">チェック状態はこの端末に保存されます</p>
    </section>
  </main>

  <!-- 予定の編集フォーム（下からせり上がるシート） -->
  <div class="edit-sheet" id="edit-sheet" hidden role="dialog" aria-labelledby="edit-sheet-title" aria-modal="false">
    <div class="edit-sheet-head">
      <span class="map-sheet-handle" aria-hidden="true"></span>
      <span class="edit-sheet-title" id="edit-sheet-title">予定を編集</span>
      <button class="map-close" id="edit-close" aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <form id="edit-form" class="edit-form">
      <div class="form-grid two">
        <label class="form-field">時刻
          <input type="time" id="f-time" required>
        </label>
        <label class="form-field">アイコン
          <select id="f-icon"></select>
        </label>
      </div>
      <label class="form-field">タイトル
        <input type="text" id="f-title" required maxlength="80" placeholder="予定のタイトル">
      </label>
      <label class="form-field">説明・メモ
        <textarea id="f-desc" rows="2" placeholder="補足があれば"></textarea>
      </label>
      <div class="form-grid two">
        <label class="form-field">日（変えると移動します）
          <select id="f-day"></select>
        </label>
        <label class="form-field">注意バッジ
          <input type="text" id="f-badge" maxlength="20" placeholder="要予約 など">
        </label>
      </div>

      <fieldset class="form-fieldset">
        <legend>場所（地図ピン）</legend>
        <label class="form-field">場所名
          <input type="text" id="f-spot-name" maxlength="60" placeholder="スポット名">
        </label>
        <div class="form-pick-row">
          <span class="form-coords" id="f-coords">未設定</span>
          <button type="button" class="form-btn" id="f-pick">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            地図でピン指定
          </button>
          <label class="form-check"><input type="checkbox" id="f-no-spot">ピンなし</label>
        </div>
        <label class="form-field">Googleマップリンク（共有リンク）
          <input type="url" id="f-mapurl" placeholder="https://maps.app.goo.gl/…">
        </label>
      </fieldset>

      <fieldset class="form-fieldset">
        <legend>この予定のあとの移動情報</legend>
        <div class="form-grid travel">
          <select id="f-travel-icon" aria-label="移動手段">
            <option value="">（なし）</option>
            <option value="🚗">車</option>
            <option value="🚢">フェリー</option>
            <option value="🚡">ロープウェー</option>
          </select>
          <input type="text" id="f-travel-text" maxlength="40" placeholder="車で約50分 など">
        </div>
      </fieldset>

      <fieldset class="form-fieldset">
        <legend>写真</legend>
        <div class="form-photo-row">
          <img id="f-photo-preview" alt="" hidden>
          <div class="form-photo-controls">
            <label class="form-btn form-file-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3"/></svg>
              写真をアップロード
              <input type="file" id="f-photo-file" accept="image/*" hidden>
            </label>
            <input type="url" id="f-photo-url" placeholder="または画像URLを貼り付け">
            <button type="button" class="form-btn danger" id="f-photo-remove" hidden>写真を外す</button>
          </div>
        </div>
        <p class="form-note" id="f-photo-status"></p>
      </fieldset>

      <div class="form-actions">
        <button type="submit" class="form-btn primary" id="f-save">保存する</button>
        <button type="button" class="form-btn" id="f-cancel">キャンセル</button>
      </div>
    </form>
  </div>

  <!-- 削除の元に戻すトースト -->
  <div class="undo-toast" id="undo-toast" hidden>
    <span id="undo-message">削除しました</span>
    <button type="button" id="undo-btn">元に戻す</button>
  </div>

  <footer class="footer">
    <p class="footer-mark" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5c2.7.7 5.3 1 8 1s5.3-.3 8-1"/><path d="M4.5 5.2 5 9"/><path d="M19.5 5.2 19 9"/><path d="M5 9h14"/><path d="M6 9l.7 12"/><path d="M18 9l-.7 12"/><path d="M12 6v3"/><path d="M5.6 13.5h12.8"/></svg>
    </p>
    <p>広島・宮島 家族旅行のしおり</p>
    <p class="footer-small">写真: <a href="https://commons.wikimedia.org/" target="_blank" rel="noopener">Wikimedia Commons</a></p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
